<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eintrag erfassen</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:600px">
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="card-title mb-4">✏️ Eintrag erfassen</h4>

            <!--
                BUGFIX: Fehlermeldung war vorher nach </html> – Thymeleaf
                konnte sie nicht verarbeiten. Jetzt korrekt innerhalb <body>.
            -->
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/entry/new}" method="post" th:object="${entry}">

                <div class="mb-3">
                    <label class="form-label">Datum</label>
                    <input type="date" th:field="*{datum}"
                           class="form-control" required>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">Startzeit</label>
                        <input type="time" th:field="*{startzeit}"
                               class="form-control" required>
                    </div>
                    <div class="col">
                        <label class="form-label">Endzeit</label>
                        <input type="time" th:field="*{endzeit}"
                               class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Pause (Minuten)</label>
                    <input type="number" min="0" th:field="*{pauseMin}"
                           class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tätigkeit</label>
                    <textarea rows="4" th:field="*{taetigkeit}"
                              class="form-control" required></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        💾 Speichern
                    </button>
                    <a th:href="@{/entries}" class="btn btn-outline-secondary">
                        Abbrechen
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
</body>
</html>
